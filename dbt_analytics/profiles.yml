stockterrain:
  target: dev
  outputs:
    dev:
      type: athena
      database: awsdatacatalog
      schema: analytics
      region_name: "{{ env_var('AWS_REGION') }}"
      s3_staging_dir: "{{ env_var('ATHENA_S3_STAGING_DIR') }}"
      s3_data_dir: "{{ env_var('ATHENA_S3_DATA_DIR') }}"
      threads: 4